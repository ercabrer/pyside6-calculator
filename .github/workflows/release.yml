name: release

on:
  push:
    branches:
      - main
      - master
    paths:
      - version.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PACKAGE_NAME: quest-calculator
  PYTHON_VERSION: "3.10"

jobs:
  details:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read and validate version
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < version.txt)"
          python -c "import re, sys; version = sys.argv[1]; assert re.fullmatch(r'[0-9]+\.[0-9]+\.[0-9]+((a|b|rc)[0-9]+)?', version), f'Invalid version: {version}'" "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"

  check_testpypi:
    needs: details
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install comparison dependency
        run: python -m pip install packaging

      - name: Ensure version is newer than TestPyPI
        env:
          NEW_VERSION: ${{ needs.details.outputs.version }}
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from packaging.version import Version

          package_name = os.environ["PACKAGE_NAME"]
          new_version = Version(os.environ["NEW_VERSION"])
          url = f"https://test.pypi.org/pypi/{package_name}/json"

          try:
              with urllib.request.urlopen(url) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print("Package not found on TestPyPI yet.")
                  raise SystemExit(0)
              raise

          releases = [Version(value) for value in payload.get("releases", {}) if value]
          if not releases:
              print("No existing TestPyPI releases found.")
              raise SystemExit(0)

          latest = max(releases)
          print(f"Latest TestPyPI version: {latest}")
          print(f"Requested version: {new_version}")
          if new_version <= latest:
              raise SystemExit(f"Version {new_version} must be greater than existing TestPyPI version {latest}.")
          PY

  build:
    needs:
      - details
      - check_testpypi
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distribution artifacts
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish_testpypi:
    name: publish to testpypi
    needs:
      - details
      - build
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish distribution to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

  github_release:
    name: create github release
    needs:
      - details
      - publish_testpypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.details.outputs.tag_name }}
        run: |
          gh release create "$TAG_NAME" dist/* \
            --target "$GITHUB_SHA" \
            --title "$TAG_NAME" \
            --generate-notes
