name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install .

      - name: Verify package import
        run: python -c "import calculator"

      - name: Verify console entry point metadata
        run: python -c "from importlib.metadata import distribution; eps = distribution('quest-calculator').entry_points; assert any(ep.group == 'console_scripts' and ep.name == 'calculator' for ep in eps)"

      - name: Compile Python sources
        run: python -m compileall calculator
